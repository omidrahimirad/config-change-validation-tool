<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Configuration Change Validation Report Preview</title>
  <desc id="desc">Preview of a Markdown validation report with validation status, risk score, failed checks, approval decision, and rollback recommendation.</desc>
  <defs>
    <style>
      .page { fill: #f4f7fb; }
      .card { fill: #ffffff; stroke: #d7dee8; stroke-width: 2; }
      .dark { fill: #111827; }
      .text { fill: #1f2937; font: 600 28px Inter, Arial, sans-serif; }
      .title { fill: #111827; font: 700 36px Inter, Arial, sans-serif; }
      .small { fill: #475569; font: 500 20px Inter, Arial, sans-serif; }
      .mono { fill: #334155; font: 500 19px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .head { fill: #e2e8f0; }
      .line { stroke: #cbd5e1; stroke-width: 1.5; }
      .bad { fill: #b91c1c; font: 700 20px Inter, Arial, sans-serif; }
      .warn { fill: #b45309; font: 700 20px Inter, Arial, sans-serif; }
      .ok { fill: #047857; font: 700 20px Inter, Arial, sans-serif; }
      .chip-red { fill: #fee2e2; stroke: #fecaca; }
      .chip-amber { fill: #fef3c7; stroke: #fde68a; }
      .chip-green { fill: #dcfce7; stroke: #bbf7d0; }
      .chart-line { fill: none; stroke: #38bdf8; stroke-width: 4; }
      .chart-red { fill: rgba(185, 28, 28, .18); stroke: #ef4444; stroke-width: 2; }
      .grid { stroke: #334155; stroke-width: 1; opacity: .65; }
    </style>
  </defs>

  <rect class="page" width="1600" height="900"/>
  <rect x="64" y="48" rx="8" ry="8" width="1472" height="804" class="card"/>
  <text x="108" y="116" class="title">Configuration Change Validation Report</text>
  <text x="108" y="154" class="small">Device/System: RTR-SITE-A-01 · Environment: production · Generated by change-validator</text>

  <rect x="108" y="198" rx="8" ry="8" width="310" height="118" class="card"/>
  <text x="132" y="235" class="small">Validation status</text>
  <rect x="132" y="256" rx="16" ry="16" width="94" height="34" class="chip-red"/>
  <text x="151" y="280" class="bad">Failed</text>

  <rect x="448" y="198" rx="8" ry="8" width="310" height="118" class="card"/>
  <text x="472" y="235" class="small">Risk score</text>
  <text x="472" y="282" class="title">75</text>
  <text x="540" y="282" class="warn">High Risk</text>

  <rect x="788" y="198" rx="8" ry="8" width="310" height="118" class="card"/>
  <text x="812" y="235" class="small">Approval decision</text>
  <text x="812" y="281" class="warn">Requires senior approval</text>

  <rect x="1128" y="198" rx="8" ry="8" width="310" height="118" class="card"/>
  <text x="1152" y="235" class="small">Rollback recommendation</text>
  <text x="1152" y="281" class="bad">Block until resolved</text>

  <rect x="108" y="360" rx="8" ry="8" width="760" height="312" class="card"/>
  <text x="132" y="405" class="text">Failed Validation Rules</text>
  <rect x="132" y="430" width="704" height="42" class="head"/>
  <text x="150" y="458" class="mono">Rule ID</text>
  <text x="292" y="458" class="mono">Severity</text>
  <text x="456" y="458" class="mono">Finding</text>
  <line x1="132" y1="506" x2="836" y2="506" class="line"/>
  <line x1="132" y1="562" x2="836" y2="562" class="line"/>
  <line x1="132" y1="618" x2="836" y2="618" class="line"/>
  <text x="150" y="497" class="mono">NET-001</text>
  <text x="292" y="497" class="bad">Critical</text>
  <text x="456" y="497" class="mono">Management IP changed without approval</text>
  <text x="150" y="553" class="mono">NET-003</text>
  <text x="292" y="553" class="warn">High</text>
  <text x="456" y="553" class="mono">Default gateway not reachable in subnet</text>
  <text x="150" y="609" class="mono">NET-006</text>
  <text x="292" y="609" class="warn">Medium</text>
  <text x="456" y="609" class="mono">NTP server list must not be empty</text>

  <rect x="908" y="360" rx="8" ry="8" width="530" height="312" class="card"/>
  <text x="932" y="405" class="text">Change Risk Timeline</text>
  <rect x="932" y="432" width="482" height="198" class="dark"/>
  <line x1="958" y1="474" x2="1392" y2="474" class="grid"/>
  <line x1="958" y1="520" x2="1392" y2="520" class="grid"/>
  <line x1="958" y1="566" x2="1392" y2="566" class="grid"/>
  <rect x="1210" y="432" width="86" height="198" class="chart-red"/>
  <path d="M958 580 C1020 572 1058 548 1108 552 C1166 558 1192 492 1234 478 C1286 462 1314 514 1392 486" class="chart-line"/>
  <text x="932" y="660" class="small">Changed fields: 6 · Passed checks: 14 · Failed checks: 3</text>

  <rect x="108" y="706" rx="8" ry="8" width="1330" height="92" class="card"/>
  <text x="132" y="748" class="text">Engineering Recommendation</text>
  <text x="132" y="780" class="small">Resolve critical findings, confirm recovery access, keep rollback steps reviewable, and rerun validation before implementation.</text>
</svg>
