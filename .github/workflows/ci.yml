name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --dev --python 3.11

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -v

      - name: CLI smoke tests
        run: |
          uv run python -m change_validator --help
          uv run change-validator --help
          uv run change-validator validate \
            --current configs/current/router_site_a.yaml \
            --planned configs/planned/router_site_a.yaml \
            --rules rules/network_rules.yaml \
            --output reports/router_site_a_change_report.md
